services:
  helpline-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_DEFAULT_COUNTRY=${VITE_DEFAULT_COUNTRY:-KE_LOCAL}
        - VITE_SIP_PASS_PREFIX=${VITE_SIP_PASS_PREFIX}
    container_name: helpline-ui
    ports:
      - "8098:80"
    restart: unless-stopped
    networks:
      - helpline-network

networks:
  helpline-network:
    driver: bridge
